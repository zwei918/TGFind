      // Pools from Astro

          sky.appendChild(star);

      // 2. Filter system state
      let activePool = [];
      let typeLabel = '';

      function applyFilter(selectedValue, triggerFetch = true) {
        // Update URL query parameters silently
        if (selectedValue === 'all') {
          window.history.replaceState(null, '', window.location.pathname);
        } else {
          window.history.replaceState(null, '', '?type=' + selectedValue);
        }

        // Update active pool
        if (selectedValue === 'channel') {
          activePool = pools.channel;
          typeLabel = '频道';
        } else if (selectedValue === 'group') {
          activePool = pools.group;
          typeLabel = '群组';
        } else if (selectedValue === 'robot') {
          activePool = pools.robot;
          typeLabel = '机器人';
        } else {
          activePool = [...pools.channel, ...pools.group, ...pools.robot];
          typeLabel = '内容';
        }

        // Update title labels
        const headline = document.getElementById('headline');
        const subheadline = document.getElementById('subheadline');
        if (headline && subheadline) {
          if (typeLabel !== '内容') {
            headline.innerText = typeLabel + '漂流瓶';
            subheadline.innerText = '在无尽的大海中捞起一个神秘漂流瓶，寻找你的宝藏 ' + typeLabel + ' 吧...';
          } else {
            headline.innerText = '海面漂流瓶';
            subheadline.innerText = '在无尽的大海中捞起一个神秘漂流瓶，寻找属于你的宝藏吧...';
          }
        }

        // Update dropdown button trigger label
        const triggerLabel = document.getElementById('current-filter-label');
        if (triggerLabel) {
          const labels = { all: '全部', channel: '频道', group: '群组', robot: '机器人' };
          triggerLabel.innerText = labels[selectedValue] || '全部';
        }

        // Update active class in dropdown items
        document.querySelectorAll('.dropdown-item').forEach(item => {
          if (item.getAttribute('data-value') === selectedValue) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });

        // Trigger new bottle if requested
        if (triggerFetch) {
          cardOverlay?.classList.remove('show');
          
          // Clear any current timeouts first so that we don't have multiple bottles active
          clearAllTimeouts();

          // Put the paper back into the bottle and pop the cork back
          if (bottleElement) {
            bottleElement.classList.remove('opened');
            bottleElement.className = 'bottle bottle-drift-away';

          currentItem = null;
          safeSetTimeout(() => {
            initBottle();
          }, 1200);

      // Initialize filter from URL query param

      const initialType = params.get('type') || 'all';
      applyFilter(initialType, false);

      // Currently selected item
      let currentItem = null;

      // Keep track of active timeouts to prevent race conditions
      let activeTimeouts = [];

      function clearAllTimeouts() {
        activeTimeouts.forEach(id => clearTimeout(id));
        activeTimeouts = [];
      }

      function safeSetTimeout(callback, delay) {
        const id = setTimeout(() => {
          activeTimeouts = activeTimeouts.filter(tId => tId !== id);
          callback();
        }, delay);
        activeTimeouts.push(id);
        return id;
      }

      // 3. Teleportation / Random pick logic
      function fetchRandomItem() {
        if (!activePool || activePool.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * activePool.length);
        return activePool[randomIndex];
      }

      // Format member numbers (e.g. 10.5K)
      function formatMembersCount(num) {
        if (!num) return '0';
        const parsed = parseInt(num, 10);
        if (isNaN(parsed)) return String(num);
        if (parsed >= 1000000) {
          return (parsed / 1000000).toFixed(1) + 'M';
        }
        if (parsed >= 1000) {
          return (parsed / 1000).toFixed(1) + 'K';
        }
        return String(parsed);
      }

      // Helper to escape HTML safely
      function escapeHTML(unsafe) {
        return (unsafe || '')
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // Populate card popup elements
      function populateCard(item) {
        if (!item) return;
        currentItem = item;

        const avatar = document.getElementById('card-avatar');
        const title = document.getElementById('card-title');
        const usernameLabel = document.getElementById('card-username-label');
        const membersLabel = document.getElementById('card-members-label');
        const description = document.getElementById('card-description');
        const typeTag = document.getElementById('card-type-tag');
        const detailsBtn = document.getElementById('btn-open-details');

        // Set avatar with fallback
        if (avatar) {
          avatar.src = '/images/loading.gif';

          const temp = new Image();
          temp.onload = function() {

          temp.onerror = function() {
            avatar.src = '/images/default.jpg';
          };
          temp.src = imgUrl;
        }

        // Set Title
        if (title) title.innerText = item.title;

        // Set Username
        if (usernameLabel) usernameLabel.innerHTML = '<i class="fa-regular fa-user"></i> @' + escapeHTML(item.username);

        // Set Members (hide member count for robots)
        if (membersLabel) {
          if (item.type === 'robot') {
            membersLabel.style.display = 'none';
          } else {
            membersLabel.style.display = 'inline-flex';
            membersLabel.innerHTML = '<i class="fa-solid fa-users"></i> ' + formatMembersCount(item.members);
          }
        }

        // Set Description
        if (description) {
          description.innerText = item.description || '（暂无详细介绍）';
        }

        // Adjust type tags icon and color class
        if (typeTag) {
          typeTag.className = 'type-tag ' + item.type;
          let iconHtml = '<i class="fa-solid fa-bullhorn"></i>';
          if (item.type === 'group') {
            iconHtml = '<i class="fa-solid fa-users"></i>';
          } else if (item.type === 'robot') {
            iconHtml = '<i class="fa-solid fa-robot"></i>';
          }
          typeTag.innerHTML = iconHtml;
        }

        // Set link for Detail Page button
        if (detailsBtn) {
          detailsBtn.href = '/detail/' + item.username.toLowerCase() + '/';
        }
      }

      // DOM Elements
      const bottleContainer = document.getElementById('bottle-container');
      const bottleElement = document.getElementById('bottle-element');
      const cardOverlay = document.getElementById('card-overlay');
      const btnThrowBack = document.getElementById('btn-throw-back');

      // Initialize with first bottle floating up
      function initBottle() {
        // Cancel all pending animations, cork pops, card displays, or scheduled respawns
        clearAllTimeouts();

        if (bottleElement) {
          currentItem = null; // Reset currentItem so a new bottle retrieves a fresh item
          
          // Preload the random item and its avatar image immediately
          const item = fetchRandomItem();
          if (item) {
            currentItem = item;
            const img = new Image();
            img.src = 'https://avatar.zwei918.github.io/TGFind/small/' + item.username.toLowerCase() + '.jpg';
          }

          // Remove opened state and set float up
          bottleElement.classList.remove('opened');
          bottleElement.className = 'bottle bottle-float-up';
          
          // Wait for float-up animation (2.2s) to settle, then automatically open
          safeSetTimeout(() => {
            bottleElement.className = 'bottle bottle-active';
            
            // Pop the cork & open the scroll automatically!
            safeSetTimeout(() => {
              autoOpenBottle(true); // Reuse the preloaded currentItem
            }, 500); 
          }, 2200);
        }
      }

      // Pop the cork and display the parchment details
      function autoOpenBottle(reuseExisting = false) {
        if (bottleElement) {
          bottleElement.classList.add('opened');
        }
        
        // Short delay for the cork/scroll animation before showing the card
        safeSetTimeout(() => {
          let item;
          if (reuseExisting && currentItem) {
            item = currentItem;
          } else {
            item = fetchRandomItem();
          }
          if (item) {
            populateCard(item);
            cardOverlay?.classList.add('show');
          }
        }, 350);
      }

      // Handle Bottle Retrieve/Click manually (optional fallback)
      bottleContainer?.addEventListener('click', () => {
        if (!bottleElement?.classList.contains('opened')) {
          // Re-open bottle with the same item
          autoOpenBottle(true);
        }
      });

      // Handle Throwing back into sea (Re-shuffling/Refetching)
      btnThrowBack?.addEventListener('click', () => {
        // Hide card first
        cardOverlay?.classList.remove('show');
        
        // Cancel all pending timeouts
        clearAllTimeouts();

        // Play drift away animation
        if (bottleElement) {
          bottleElement.classList.remove('opened');
          bottleElement.className = 'bottle bottle-drift-away';
        }

        // After drift away completes, spawn a new bottle floating up
        safeSetTimeout(() => {
          initBottle();
        }, 1200);
      });

      // Close overlay when clicking outside the card
      cardOverlay?.addEventListener('click', (e) => {
        if (e.target === cardOverlay) {
          cardOverlay.classList.remove('show');
          // Put the paper back into the bottle and pop the cork back
          if (bottleElement) {
            bottleElement.classList.remove('opened');
          }
        }
      });

      // Dropdown UI Interaction
      const dropdownTrigger = document.getElementById('dropdown-trigger');
      const dropdownMenu = document.getElementById('dropdown-menu');
      
      dropdownTrigger?.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu?.classList.toggle('show');
      });

      // Close dropdown when clicking anywhere else
      document.addEventListener('click', () => {
        dropdownMenu?.classList.remove('show');
      });

      // Item click handling
      document.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const selectedValue = e.currentTarget.getAttribute('data-value');
          applyFilter(selectedValue, true);
        });
      });

      // Handle smart back button navigation
      const btnBack = document.getElementById('btn-back');
      if (btnBack) {
        btnBack.addEventListener('click', (e) => {
          e.preventDefault();
          if (document.referrer && document.referrer.includes(window.location.host)) {
            history.back();
          } else {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            if (type === 'channel' || type === 'group' || type === 'robot') {
              window.location.href = '/' + type + '/';
            } else {
              window.location.href = '/';
            }
          }
        });
      }

      // Start the page!
      initBottle();
    })();</script> </body> </html>
