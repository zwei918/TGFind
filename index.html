<title>TGFind - Telegram 频道群组导航</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7;
  --card: #fff;
  --text: #333;
  --muted: #888;
  --primary: #2a9df4;
  --border: #eaeaea;
}
.dark {
  --bg: #1a1b1e;
  --card: #2a2b2e;
  --text: #e8e8e8;
  --muted: #999;
  --primary: #5baeff;
  --border: #38393c;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* Top Bar */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  padding: 0 16px;
}
.topbar-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; height: 52px; gap: 12px;
}
.logo {
  font-weight: 700; font-size: 1.1rem; color: var(--primary);
  text-decoration: none; flex-shrink: 0;
}
.logo img { width: 28px; height: 28px; border-radius: 6px; margin-right: 4px; vertical-align: middle; }
.tabs {
  display: flex; gap: 4px; flex: 1; overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 5px 14px; border-radius: 16px;
  font-size: .8rem; cursor: pointer; border: 1px solid var(--border);
  color: var(--muted); background: transparent; transition: .15s;
  white-space: nowrap; text-decoration: none;
}
.tab:hover { background: rgba(42,157,244,.08); color: var(--primary); }
.tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }
.dmbtn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
  background: none; cursor: pointer; font-size: .95rem; color: var(--text);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* Hero */
.hero {
  background: linear-gradient(135deg, #1a73e8, #4a90d9);
  text-align: center; padding: 36px 16px 28px;
}
.hero h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
.hero p { font-size: .82rem; color: rgba(255,255,255,.7); margin-top: 4px; }

/* Search */
.search-bar {
  max-width: 500px; margin: -18px auto 0; padding: 0 16px; position: relative; z-index: 2;
}
.search-bar input {
  width: 100%; height: 42px; border: none; border-radius: 21px;
  padding: 0 48px 0 18px; font-size: .88rem; background: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,.08); color: #333; outline: none;
}
.search-bar .sicon {
  position: absolute; right: 28px; top: 50%; transform: translateY(-50%); color: #999;
}

/* Stats */
.stats-row {
  display: flex; justify-content: center; gap: 28px; padding: 18px 12px 6px;
}
.stat { text-align: center; }
.stat-n { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
.stat-l { font-size: .68rem; color: var(--muted); }

/* Notice */
.notice {
  max-width: 1140px; margin: 0 auto; padding: 0 16px 8px;
}
.notice-box {
  padding: 8px 14px; border-radius: 8px;
  background: rgba(42,157,244,.06); font-size: .78rem; color: var(--primary);
}
.notice-box a { color: var(--primary); font-weight: 600; }

/* Controls */
.ctrl {
  max-width: 1140px; margin: 0 auto; padding: 0 16px 8px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;
}
.ctrl-info { font-size: .78rem; color: var(--muted); }
.sort-btn {
  font-size: .72rem; padding: 4px 12px; border-radius: 14px; cursor: pointer;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  transition: .15s;
}
.sort-btn:hover, .sort-btn.on { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Content */
.content { max-width: 1140px; margin: 0 auto; padding: 0 16px; }
.sec-title {
  font-size: .95rem; font-weight: 700; border-bottom: 2px solid var(--primary);
  padding-bottom: 6px; margin: 18px 0 10px; display: flex; align-items: center; gap: 6px;
}
.sec-title .cnt { font-size: .72rem; color: var(--muted); font-weight: 400; margin-left: auto; }

/* Cards */
.card-row { --bs-gutter-y: 10px; }
.url-card { }
.url-body {
  background: var(--card); border-radius: 10px; border: 1px solid var(--border);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  transition: .15s; position: relative; overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.url-body:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); transform: translateY(-1px); }
.avatar {
  width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  background: #e5e7eb;
}
.info { flex: 1; min-width: 0; }
.info a { text-decoration: none; color: inherit; }
.name {
  font-size: .85rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.desc {
  font-size: .72rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
}
.tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: .62rem; padding: 1px 6px; border-radius: 8px;
  background: rgba(42,157,244,.1); color: var(--primary); white-space: nowrap;
}
.arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 26px; height: 26px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: .75rem; opacity: 0; transition: .15s; text-decoration: none;
}
.url-body:hover .arrow { opacity: 1; }

/* Footer */
.footer {
  max-width: 1140px; margin: 32px auto 0; padding: 16px;
  text-align: center; font-size: .72rem; color: var(--muted);
  border-top: 1px solid var(--border);
}
.footer a { color: var(--primary); }

/* Empty */
.empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }

/* Mobile */
@media (max-width: 640px) {
  .topbar-inner { height: 46px; gap: 8px; }
  .logo { font-size: .95rem; }
  .tab { padding: 4px 8px; font-size: .7rem; }
  .hero { padding: 28px 12px 20px; }
  .hero h1 { font-size: 1.2rem; }
  .hero p { font-size: .75rem; }
  .search-bar input { height: 38px; font-size: .8rem; }
  .url-body { padding: 8px 10px; gap: 8px; }
  .avatar { width: 34px; height: 34px; }
  .name { font-size: .78rem; }
  .desc { font-size: .68rem; }
  .arrow { right: 6px; width: 22px; height: 22px; font-size: .7rem; opacity: 1; }
  .sec-title { font-size: .85rem; margin: 14px 0 8px; }
}
</style>

const CATS = ["全部", ...new Set(DATA.map(d=>d.c))];
let curCat = "全部", curSort = "default", query = "";

function flt() {
  let it = [...DATA];
  if (curCat !== "全部") it = it.filter(d => d.c === curCat);
  if (query) {
    const q = query.toLowerCase();
    it = it.filter(d => d.n.toLowerCase().includes(q) || d.d.toLowerCase().includes(q) || d.g.toLowerCase().includes(q));
  }
  if (curSort === "name") it.sort((a,b) => a.n.localeCompare(b.n, "zh-CN"));
  return it;
}

function grp(it) {
  const g = {};
  it.forEach(i => { if (!g[i.c]) g[i.c] = []; g[i.c].push(i); });
  return g;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function tb(t) {
  if (t === "channel") return "📢 频道";
  if (t === "group") return "👥 群组";
  if (t === "robot") return "🤖 机器人";
  return "🔗 链接";
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(c => {
    const n = c === "全部" ? DATA.length : DATA.filter(d => d.c === c).length;
    return `<span class="tab${c === curCat ? " on" : ""}" onclick="selectCat('${c}')">${c} ${n}</span>`;
  }).join("");
}

function renderContent() {
  const it = flt(), gd = grp(it);
  document.getElementById("ctrlInfo").textContent = `共 ${it.length} 个`;
  document.getElementById("statC").textContent = DATA.filter(d => d.t === "channel").length;
  document.getElementById("statG").textContent = DATA.filter(d => d.t === "group").length;
  document.getElementById("statR").textContent = DATA.filter(d => d.t === "robot").length;

  if (!it.length) {
    document.getElementById("content").innerHTML = '<div class="empty-state"><p>没有匹配的结果</p></div>';
    return;
  }

  let html = "";
  for (const [c, items] of Object.entries(gd)) {
    html += `<div class="sec-title">📌 ${c}<span class="cnt">${items.length} 个</span></div><div class="row card-row">`;
    items.forEach(x => {
      const av = `https://t.me/i/userpic/160/${x.l.replace(/^t\.me\//, "")}.jpg`;
      const href = x.l.startsWith("t.me/") ? `https://${x.l}` : `https://t.me/${x.l}`;
      html += `<div class="col-6 col-md-4 col-lg-3"><div class="url-body">
        <img class="avatar" src="${av}" loading="lazy" onerror="this.style.display='none'" alt="">
        <div class="info">
          <a href="${href}" target="_blank" rel="nofollow"><div class="name">${esc(x.n)}</div></a>
          <div class="desc">${esc(x.d)}</div>
          <div class="tags"><span class="tag">${tb(x.t)}</span><span class="tag">${x.g}</span></div>
        </div>
        <a class="arrow" href="${href}" target="_blank" rel="nofollow">➤</a>
      </div></div>`;
    });
    html += `</div>`;
  }
  document.getElementById("content").innerHTML = html;
}

function selectCat(c) {
  curCat = c;
  renderTabs();
  renderContent();
  window.scrollTo({ top: 240, behavior: "smooth" });
}

function setSort(s, b) {
  curSort = s;
  document.querySelectorAll(".sort-btn").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  renderContent();
}

function toggleDark() {
  document.body.classList.toggle("dark");
  const d = document.body.classList.contains("dark");
  document.querySelector(".dmbtn").textContent = d ? "☀️" : "🌙";
  localStorage.setItem("tgfind-dark", d ? "1" : "0");
}

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("tgfind-dark") === "1") {
    document.body.classList.add("dark");
    document.querySelector(".dmbtn").textContent = "☀️";
  }
  renderTabs();
  renderContent();

  document.getElementById("searchInput").addEventListener("input", function() {
    query = this.value.trim();
    renderContent();
  });
});
</script>
</body>
</html>
